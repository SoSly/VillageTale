name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  # Change to APPROVE / REQUEST_CHANGES / COMMENT
  REVIEW_EVENT: COMMENT
  # Timeout for Claude API calls in seconds (increase for large PRs)
  CLAUDE_TIMEOUT: 180
  # System prompt for Claude
  SYSTEM_PROMPT: |
    Review this Minecraft 1.20.1 mod PR focusing on:
    - Minecraft/Forge conventions and best practices
    - Capability system usage and entity AI goals
    - Resource usage and performance (tick loops, chunk loading)
    - Code style: early returns, always use braces, sparse comments
    - VillageTale specific: zone systems, villager behaviors, work mechanics

    Be direct and critical. Skip the praise unless something is genuinely clever.
    Focus on actual problems, not style nitpicks.

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ai-pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify tools
        run: |
          node -v
          npm -v
          jq --version
          curl --version

      - name: Verify Claude CLI availability
        run: |
          set -euo pipefail
          echo "Checking npx access to Claude CLI..."
          npx --yes @anthropic-ai/claude-code --version || true


      - name: Gather PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Set for this step and export for later steps
          PR="${{ github.event.pull_request.number }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          echo "PR=$PR" >> "$GITHUB_ENV"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

          # Use explicit repo + PR number in detached HEAD context
          gh pr view "$PR" --repo "${{ github.repository }}" --json number,title,body,author,baseRefName,headRefName,url > pr.json
          gh pr diff "$PR" --repo "${{ github.repository }}" --patch > diff.patch

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          # Validate API key is set
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is not configured"
            echo "Please add ANTHROPIC_API_KEY to your repository secrets"
            exit 1
          fi
          # Mask API key in logs
          echo "::add-mask::${ANTHROPIC_API_KEY}"

          # Compose the instruction sent to cli (JSON output format)
          INSTRUCTION=$(cat <<'EOF'
          You are reviewing a pull request diff. Output ONLY valid JSON, no markdown, no explanations, just the JSON object.

          Output a JSON review with this exact structure:
          {
            "summary": "2-3 sentence assessment of the changes",
            "comments": [
              {
                "file": "path/to/file",
                "line": 123,
                "body": "Issue description"
              }
            ],
            "status": {
              "state": "success",
              "description": "Brief reason under 120 chars"
            }
          }

          Rules:
          - If there are no issues, return empty comments array: "comments": []
          - State should be "success" unless there are critical issues that must be fixed
          - For YAML/config files, focus on syntax and configuration correctness
          - For the "line" field, use the ABSOLUTE line number from the file (the number shown after the + in the diff)
          - Output ONLY the JSON object, nothing else before or after it
          EOF
          )

          # Run CLI in non-interactive mode with retries for malformed/empty output
          echo "Running AI review with Claude..."
          echo "Command: npx @anthropic-ai/claude-code --print"
          echo "Diff size: $(wc -c < diff.patch) bytes"
          echo "Timeout: ${CLAUDE_TIMEOUT} seconds"

          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."

            if cat diff.patch | timeout ${CLAUDE_TIMEOUT} npx --yes @anthropic-ai/claude-code --print "${SYSTEM_PROMPT}

          ${INSTRUCTION}" > ai_output_raw.txt; then
              # Strip markdown code blocks if present
              if grep -q '```json' ai_output_raw.txt; then
                echo "Stripping markdown code block wrapper..."
                sed -n '/^[[:space:]]*```json/,/^[[:space:]]*```$/{//d;p}' ai_output_raw.txt > ai_output.json
              else
                cp ai_output_raw.txt ai_output.json
              fi

              # Check if output contains valid JSON with required elements
              if jq -e '.summary and .comments and .status' ai_output.json > /dev/null 2>&1; then
                echo "Valid JSON review received"
                break
              else
                echo "Invalid or empty JSON received, retrying..."
                echo "--- Debug: Raw output ---"
                head -n 20 ai_output_raw.txt || true
                echo "--- End debug output ---"
                RETRY_COUNT=$((RETRY_COUNT + 1))
              fi
            else
              echo "AI call failed, retrying..."
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          
            # Add delay between retries
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Waiting 5 seconds before retry..."
              sleep 5
            fi
          done
          
          # If all retries failed, create fallback response
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "All retry attempts failed, creating fallback response"
            cat > ai_output.json <<'FALLBACK'
          {
            "summary": "AI review failed after multiple attempts. The review system encountered an error.",
            "comments": [],
            "status": {
              "state": "failure",
              "description": "AI Review failed - check workflow logs"
            }
          }
          FALLBACK
            echo "ERROR: AI review failed after all retry attempts"
            echo "WORKFLOW_FAILED=true" >> "$GITHUB_ENV"
          fi

          echo "AI review completed"
          echo "--- JSON Output ---"
          cat ai_output.json
          echo -e "\n--- End JSON Output ---"

          # Extract sections using jq for JSON parsing
          echo "Extracting review components..."

          # Extract summary and create review body
          jq -r '.summary // "No summary provided"' ai_output.json > summary.txt
          echo "## Summary" > review.md
          cat summary.txt >> review.md

          # Parse diff to find which lines are actually in the diff (added or modified)
          echo "Extracting changed line numbers from diff..."
          awk '
            /^\+\+\+ b\// {
              file = substr($0, 7)
            }
            /^@@ -[0-9]+,[0-9]+ \+([0-9]+)/ {
              match($0, /\+([0-9]+)/, arr)
              line_num = arr[1]
            }
            /^\+[^+]/ {
              print file ":" line_num
              line_num++
            }
            /^[^+-]/ && !/^@@/ {
              line_num++
            }
          ' diff.patch > changed_lines.txt

          echo "Changed lines detected:"
          head -n 20 changed_lines.txt

          # Filter comments: inline for changed lines, body for others
          jq -r --slurpfile changed_lines <(cat changed_lines.txt) '
            .comments as $all_comments |
            ([$changed_lines[0] | split("\n")[] | select(length > 0)] | map(split(":") | {file: .[0], line: (.[1] | tonumber)})) as $changed |
            {
              inline: ($all_comments | map(select(. as $c | $changed | any(.file == $c.file and .line == $c.line))) | map({path: .file, line: .line, side: "RIGHT", body: .body})),
              body_only: ($all_comments | map(select(. as $c | $changed | any(.file == $c.file and .line == $c.line) | not)))
            }
          ' ai_output.json > filtered_comments.json

          # Extract inline comments
          jq -r '.inline' filtered_comments.json > comments.json

          # Add non-inlineable comments to review body
          BODY_COMMENT_COUNT=$(jq -r '.body_only | length' filtered_comments.json)
          if [ "$BODY_COMMENT_COUNT" -gt 0 ]; then
            echo -e "\n\n## Additional Comments" >> review.md
            echo "(Comments on unchanged lines)" >> review.md
            jq -r '.body_only[] | "\n### \(.file):\(.line)\n\(.body)"' filtered_comments.json >> review.md
          fi

          echo "Generated review body:"
          cat review.md
          echo "Inline comments:"
          cat comments.json

          # Extract status
          jq -r '.status // {state: "success", description: "AI Review completed"}' ai_output.json > status.json

      - name: Post PR review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Build review payload with body + filtered inline comments
          jq -n \
            --arg event "${REVIEW_EVENT}" \
            --arg body "$(cat review.md)" \
            --argjson comments "$(cat comments.json)" \
            '{ event: $event, body: $body, comments: $comments }' > review_payload.json

          echo "Final review payload:"
          cat review_payload.json

          # Post the review
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/pulls/$PR/reviews" \
            --input review_payload.json

      - name: Set commit status from AI StatusJSON
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Guard: create a default status based on whether workflow failed
          if [ ! -f status.json ]; then
            if [ "${WORKFLOW_FAILED:-false}" = "true" ]; then
              echo '{"state":"failure","description":"AI Review workflow failed"}' > status.json
            else
              echo '{"state":"success","description":"AI Review completed"}' > status.json
            fi
          fi
          STATE=$(jq -r '.state // "failure"' status.json)
          DESC=$(jq -r '.description // "AI Review failed"' status.json)
          SHA="${{ github.event.pull_request.head.sha }}"
          gh api \
            -X POST \
            repos/${{ github.repository }}/statuses/${SHA} \
            -f state="$STATE" \
            -f context="AI PR Review" \
            -f description="$DESC"

          # Fail the workflow if AI review failed
          if [ "${WORKFLOW_FAILED:-false}" = "true" ]; then
            echo "Failing workflow due to AI review failure"
            exit 1
          fi
